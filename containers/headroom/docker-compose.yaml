version: '3.8'

services:
  ammare-headroom:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ammare-headroom
    restart: always
    ports:
      - "${AMMARE_HEADROOM_PORT}:8001"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ammare-network

networks:
  ammare-network:
    external: true
    name: ammare-network
