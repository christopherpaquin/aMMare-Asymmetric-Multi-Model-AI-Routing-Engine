# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # Python Linting and Formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  # Bash Linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  # Markdown Linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.0
    hooks:
      - id: markdownlint
        args: [ "--config", ".markdownlint.yaml", "--fix" ]

  # Secret Detection in Files
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock.json

  # Secret Detection in Commit Messages
  - repo: local
    hooks:
      - id: check-commit-msg-secrets
        name: Check Commit Message for Secrets
        entry: python .githooks/check_commit_msg_secrets.py
        language: python
        stages: [commit-msg]
        additional_dependencies: ['detect-secrets==1.5.0']
