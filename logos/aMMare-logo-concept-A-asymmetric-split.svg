<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E2230"/>
      <stop offset="1" stop-color="#0A1720"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="800" height="280" rx="24" fill="url(#tile)"/>

  <!-- ======== MARK: asymmetric route split ======== -->
  <g transform="translate(70,72)">
    <!-- incoming request line -->
    <path d="M 0 68 H 96" stroke="#F2F7F7" stroke-width="10" stroke-linecap="round" fill="none"/>
    <!-- gateway node (router ring) -->
    <circle cx="128" cy="68" r="26" fill="none" stroke="#2DD4BF" stroke-width="10"/>
    <!-- heavy local path (short, thick, teal) -->
    <path d="M 152 80 C 196 104, 220 112, 258 112" stroke="#2DD4BF" stroke-width="16" stroke-linecap="round" fill="none"/>
    <rect x="262" y="96" width="34" height="34" rx="7" fill="#2DD4BF"/>
    <!-- thin escalation path (long, thin, amber) -->
    <path d="M 150 52 C 200 16, 268 8, 330 12" stroke="#FFB454" stroke-width="6" stroke-linecap="round" stroke-dasharray="1 14" fill="none"/>
    <circle cx="352" cy="14" r="15" fill="none" stroke="#FFB454" stroke-width="6"/>
  </g>

  <!-- ======== WORDMARK ======== -->
  <g font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="70" y="238" font-size="64" font-weight="800" letter-spacing="-1">
      <tspan fill="#F2F7F7">a</tspan><tspan fill="#2DD4BF">M</tspan><tspan fill="#FFB454">M</tspan><tspan fill="#F2F7F7">are</tspan>
    </text>
    <text x="330" y="232" font-size="19" font-weight="500" letter-spacing="0.5" fill="#7FA3B0">Asymmetric Multi-Model AI Routing Engine</text>
  </g>
</svg>
